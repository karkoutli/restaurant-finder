<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sofia's Spots</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  /* Sofia's Pinterest palette: clean girl, white/cream, blush pink, gold */
  --cream: #FDFBF9; --card: #FFFFFF; --warm-bg: #F7F2EF;
  --blush: #F0D4D8; --blush-light: #F9ECEE;
  --taupe: #C9B5AD; --taupe-dark: #8A7570;
  --gold: #C9A96E; --text: #2B2220;
  --text-soft: #695C55; --text-muted: #A69890;
  --pink: #DBA0A8; --pink-soft: #EDCAD0;
  --pink-bg: #FDF2F3; --pink-accent: #D48A94;
  --heart: #CB6E7A; --border: #F0E5E1;
  --shadow: 0 1px 6px rgba(44,36,32,0.06);
  --shadow-hover: 0 6px 24px rgba(44,36,32,0.1);
  --radius: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);-webkit-font-smoothing:antialiased}

/* ── Header ── */
.header{text-align:center;padding:28px 20px 12px}
.header h1{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:2px;color:var(--pink-accent);text-transform:uppercase}
.header .sub{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--pink);margin-top:3px;letter-spacing:.5px}

/* ── Filter Bar ── */
.filters{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:center;flex-wrap:wrap}
.filters::-webkit-scrollbar{display:none}
.chip{background:var(--card);border:1px solid var(--border);padding:7px 15px;border-radius:24px;font-size:12px;font-weight:500;color:var(--text-soft);cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.3px}
.chip:hover{border-color:var(--pink-soft)}
.chip.active{background:var(--pink-accent);color:#fff;border-color:var(--pink-accent)}
.chip select{background:transparent;border:none;color:inherit;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none}
.chip select option{background:var(--card);color:var(--text)}
.search-wrap{position:relative}
.search-wrap input{background:var(--card);border:1px solid var(--border);padding:7px 14px 7px 32px;border-radius:24px;font-size:12px;font-family:inherit;color:var(--text);width:150px;outline:none}
.search-wrap input:focus{border-color:var(--pink-accent)}
.search-wrap input::placeholder{color:var(--taupe)}
.search-wrap::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--pink-soft)}

/* ── View Toggle ── */
.view-bar{display:flex;justify-content:center;align-items:center;gap:6px;padding:4px 20px 16px}
.view-btn{background:transparent;border:1px solid var(--border);padding:7px 20px;border-radius:24px;font-size:12px;font-weight:500;font-family:inherit;color:var(--text-soft);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.view-btn.active{background:var(--pink-accent);color:#fff;border-color:var(--pink-accent)}
.view-btn svg{width:14px;height:14px;fill:currentColor}
.count-badge{font-size:11px;color:var(--text-muted);margin-left:8px}

/* ══ GRID VIEW (Option B) ══ */
.grid-view{padding:0 14px 40px}
.masonry{column-count:4;column-gap:14px}
@media(max-width:1200px){.masonry{column-count:3}}
@media(max-width:768px){.masonry{column-count:2;column-gap:10px}}

.card-b{break-inside:avoid;margin-bottom:14px;background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .3s;box-shadow:var(--shadow);position:relative}
.card-b:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.card-b img{width:100%;display:block;object-fit:cover;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg));min-height:120px}
.card-b .img-ph{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg));display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--pink-soft)}
.card-b .save{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.88);border:none;font-size:15px;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;backdrop-filter:blur(4px)}
.card-b:hover .save{opacity:1}
.card-b .save.on{opacity:1;color:var(--heart)}
.card-b .badge{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);padding:3px 10px;border-radius:12px;font-size:9px;font-weight:600;color:var(--heart);letter-spacing:.5px}
.card-b .body{padding:10px 12px 14px}
.card-b .name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--text);line-height:1.2;margin-bottom:3px}
.card-b .cuisine{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--pink-accent);font-weight:500;margin-bottom:5px}
.card-b .info{font-size:11px;color:var(--text-soft);line-height:1.5;margin-bottom:6px}
.card-b .info .stars{color:var(--gold)}
.card-b .info .price{color:var(--taupe-dark);font-weight:500}
.card-b .links{display:flex;gap:5px}
.card-b .links a{font-size:9px;color:var(--pink-accent);text-decoration:none;padding:3px 10px;border:1px solid var(--blush);border-radius:14px;font-weight:500;letter-spacing:.3px;transition:all .15s}
.card-b .links a:hover{background:var(--pink-bg);border-color:var(--pink-accent)}

/* ══ LIST VIEW (Option C) ══ */
.list-view{display:none;max-width:700px;margin:0 auto;padding:0 14px 40px}
.list-view .list{display:flex;flex-direction:column;gap:12px}

.card-c{display:flex;gap:12px;background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .3s;box-shadow:var(--shadow)}
.card-c:hover{transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.card-c img{width:110px;height:110px;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg))}
.card-c .img-ph{width:110px;height:110px;flex-shrink:0;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg));display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--pink-soft)}
.card-c .body{padding:10px 12px 10px 0;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.card-c .top{display:flex;justify-content:space-between;align-items:flex-start}
.card-c .name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--text);line-height:1.2;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-c .fav{background:none;border:none;font-size:16px;color:var(--text-muted);cursor:pointer;flex-shrink:0;padding:0 2px;transition:color .15s}
.card-c .fav.on{color:var(--heart)}
.card-c .cuisine{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--pink-accent);font-weight:500;margin:2px 0 4px}
.card-c .info{font-size:11px;color:var(--text-soft);line-height:1.4}
.card-c .info .stars{color:var(--gold)}
.card-c .badge-inline{font-size:9px;font-weight:600;color:var(--heart);background:var(--pink-bg);padding:1px 6px;border-radius:8px;margin-left:4px}
.card-c .links{display:flex;gap:5px;margin-top:5px}
.card-c .links a{font-size:9px;color:var(--pink-accent);text-decoration:none;padding:2px 8px;border:1px solid var(--blush);border-radius:12px;font-weight:500;transition:all .15s}
.card-c .links a:hover{background:var(--pink-bg);border-color:var(--pink-accent)}

/* ══ MAP VIEW ══ */
.map-view{display:none;padding:0 14px 40px}
.map-wrap{width:100%;height:65vh;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
#map{width:100%;height:100%}
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--text)!important;border-radius:12px!important;box-shadow:var(--shadow-hover)!important;font-family:'DM Sans',sans-serif!important}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-content{margin:10px!important}
.pop-img{width:100%;height:110px;object-fit:cover;border-radius:8px;margin-bottom:6px}
.pop-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;margin-bottom:2px}
.pop-cuisine{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--pink-accent)}
.pop-meta{font-size:11px;color:var(--text-soft);margin-top:4px;line-height:1.5}
.pop-meta .stars{color:var(--gold)}
.pop-links{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}
.pop-links a{font-size:9px;color:var(--pink-accent);text-decoration:none;padding:3px 8px;border:1px solid var(--blush);border-radius:12px}

/* ══ DETAIL MODAL ══ */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,36,32,0.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:9999;justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-card{background:var(--card);border-radius:20px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(44,36,32,0.25);position:relative;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-soft);z-index:2;transition:transform .15s}
.modal-close:hover{transform:scale(1.1)}
.modal-img{width:100%;height:240px;object-fit:cover;display:block}
.modal-img-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg));display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--pink-soft)}
.modal-save{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);border:none;padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--text-soft);font-weight:500;font-family:inherit;transition:all .15s}
.modal-save.on{color:var(--heart)}
.modal-badge{position:absolute;top:52px;left:12px;background:rgba(255,255,255,0.9);backdrop-filter:blur(4px);padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;color:var(--heart);letter-spacing:.5px}
.modal-body{padding:20px 22px 24px}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:4px}
.modal-cuisine{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--pink-accent);font-weight:500;margin-bottom:12px}
.modal-stats{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.modal-stat{font-size:13px;color:var(--text-soft)}
.modal-stat .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);display:block;margin-bottom:2px}
.modal-stat .val{font-weight:500}
.modal-stat .stars{color:var(--gold)}
.modal-score{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.modal-score-item{font-size:11px;color:var(--text-muted);background:var(--pink-bg);padding:3px 10px;border-radius:10px}
.modal-score-item span{color:var(--pink-accent);font-weight:600}
.modal-address{font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.5}
.modal-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.modal-cat{font-size:10px;padding:3px 10px;border-radius:12px;background:var(--blush-light);color:var(--taupe-dark);font-weight:500}
.modal-links{display:flex;gap:8px;flex-wrap:wrap}
.modal-link{font-size:12px;color:var(--pink-accent);text-decoration:none;padding:8px 18px;border:1px solid var(--blush);border-radius:20px;font-weight:500;letter-spacing:.3px;transition:all .15s;text-align:center;flex:1;min-width:0}
.modal-link:hover{background:var(--pink-bg);border-color:var(--pink-accent)}
.modal-link.primary{background:var(--pink-accent);color:#fff;border-color:var(--pink-accent)}
.modal-link.primary:hover{background:var(--heart)}
.modal-photos{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.modal-photos::-webkit-scrollbar{display:none}
.modal-photos img{height:100px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:transform .15s}
.modal-photos img:hover{transform:scale(1.03)}
.modal-photos-link{font-size:11px;color:var(--pink-accent);text-decoration:none;margin-bottom:14px;display:inline-block}

/* ══ RECOMMENDED ROW ══ */
.recs-section{padding:0 16px 20px}
.recs-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text);margin-bottom:10px;padding-left:2px}
.recs-title span{color:var(--pink-accent);font-style:italic}
.recs-scroll{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.recs-scroll::-webkit-scrollbar{display:none}
.rec-card{flex-shrink:0;width:200px;background:var(--card);border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s,box-shadow .3s;position:relative}
.rec-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.rec-card img{width:100%;height:140px;object-fit:cover;display:block;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg))}
.rec-card .rec-ph{width:100%;height:140px;background:linear-gradient(135deg,var(--blush-light),var(--pink-bg));display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--pink-soft)}
.rec-card .rec-tag{position:absolute;top:8px;left:8px;background:var(--pink-accent);color:#fff;font-size:9px;font-weight:600;padding:3px 10px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase}
.rec-card .rec-body{padding:8px 10px 10px}
.rec-card .rec-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--text);line-height:1.2;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-card .rec-meta{font-size:10px;color:var(--text-muted)}
.rec-card .rec-meta .stars{color:var(--gold)}
@media(max-width:768px){.rec-card{width:170px}.rec-card img,.rec-card .rec-ph{height:120px}.recs-section{padding:0 10px 16px}}

.scroll-sentinel{height:1px}

/* ── Mobile ── */
@media(max-width:768px){
  .header{padding:20px 16px 8px}
  .header h1{font-size:24px;letter-spacing:1.5px}
  .filters{padding:8px 10px;justify-content:flex-start;flex-wrap:nowrap}
  .chip{padding:6px 12px;font-size:11px;flex-shrink:0}
  .search-wrap input{width:120px;font-size:11px}
  .view-bar{padding:4px 14px 12px}
  .card-b .save{opacity:1;width:28px;height:28px;font-size:13px}
  .card-b .name{font-size:15px}
  .card-b .body{padding:8px 10px 12px}
  .card-c img,.card-c .img-ph{width:90px;height:90px}
  .card-c .name{font-size:15px}
  .map-wrap{height:55vh;border-radius:12px}
}
</style>
</head>
<body>

<div class="header">
  <h1>Sofia's Spots</h1>
  <div class="sub">find your next spot</div>
</div>

<div class="filters">
  <div class="chip active" id="vibe-chip">Her Vibe</div>
  <div class="chip"><select id="f-cuisine"><option value="all">Cuisine</option><option value="coffee">Coffee & Matcha</option></select></div>
  <div class="chip"><select id="f-area">
    <option value="all">All SoCal</option>
    <optgroup label="── LA County ──">
      <option value="1" selected>West LA</option>
      <option value="malibu">Malibu</option>
      <option value="dtla">DTLA</option>
      <option value="eastla">East LA</option>
      <option value="glendale">Glendale / Pasadena</option>
      <option value="3">The Valley</option>
    </optgroup>
    <optgroup label="── Long Beach ──">
      <option value="longbeach">Long Beach</option>
    </optgroup>
    <optgroup label="── Orange County ──">
      <option value="4">All OC</option>
      <option value="irvine">Irvine</option>
      <option value="newport">Newport Beach</option>
      <option value="costamesa">Costa Mesa</option>
    </optgroup>
  </select></div>
  <div class="chip"><select id="f-price"><option value="all">Price</option><option value="2">$$</option><option value="3">$$$</option><option value="4">$$$$</option></select></div>
  <div class="chip"><select id="f-rating"><option value="0">Rating</option><option value="4.0">4.0+</option><option value="4.3">4.3+</option><option value="4.5">4.5+</option></select></div>
  <div class="chip" id="takeout-chip">Takeout</div>
  <div class="chip" id="mic-chip">Michelin</div>
  <div class="chip" id="fav-chip">Saved ♥</div>
  <div class="search-wrap"><input type="text" id="f-search" placeholder="Search..."></div>
</div>

<div class="view-bar">
  <button class="view-btn active" id="btn-grid">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Grid
  </button>
  <button class="view-btn" id="btn-list">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1.5"/><rect x="3" y="10" width="18" height="4" rx="1.5"/><rect x="3" y="16" width="18" height="4" rx="1.5"/></svg>
    List
  </button>
  <button class="view-btn" id="btn-map">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    Map
  </button>
  <span class="count-badge"><span id="count">0</span> spots</span>
</div>

<div class="recs-section" id="recs-section">
  <div class="recs-title">Recommended <span>for you</span></div>
  <div class="recs-scroll" id="recs-scroll"></div>
</div>
<div class="grid-view" id="grid-view"><div class="masonry" id="masonry"></div><div class="scroll-sentinel" id="sentinel"></div></div>
<div class="list-view" id="list-view"><div class="list" id="list-cards"></div><div class="scroll-sentinel" id="sentinel-list"></div></div>
<div class="map-view" id="map-view"><div class="map-wrap"><div id="map"></div></div></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-card" id="modal-card"></div>
</div>

<script>
let ALL=[],FILTERED=[],map,markerGroup,favGroup,mapReady=false,rendered=0,renderedList=0;
const BATCH=30;
let favs=JSON.parse(localStorage.getItem('sofia_favorites')||'{}');
const VIBE=new Set(["Japanese / Sushi","Italian","Steakhouse","Persian","Mediterranean","Mexican / Latin","Seafood","French","Wine Bar / Lounge","Asian"]);
const DOTS={"Japanese / Sushi":"#C97070","Italian":"#7A8F6D","Steakhouse":"#B8A99A","Persian":"#C5A972","Mediterranean":"#8BA4B8","Mexican / Latin":"#C9A86C","Asian":"#D4A0A0","Seafood":"#7EB5B5","French":"#B8A0C9","American":"#A0A0B8","Wine Bar / Lounge":"#C9B8A0","Other":"#B8B0A8"};
const heights=[200,260,180,240,220,280,190,250,210,270,200,230,195,255,215,245,185,265,205,235];

function sF(){localStorage.setItem('sofia_favorites',JSON.stringify(favs))}
function isF(n){return!!favs[n]}
function togF(n,e){if(e)e.stopPropagation();favs[n]?delete favs[n]:favs[n]=true;sF();applyFilters()}
function stars(r){return r?'<span class="stars">★</span> '+r:''}
function esc(s){return s.replace(/'/g,"\\'")}
function bookUrl(r){return`https://www.opentable.com/s?term=${encodeURIComponent(r.name)}&latitude=${r.lat}&longitude=${r.lng}`}
function menuUrl(r){return r.yelp_menu_url||r.website||`https://www.google.com/search?q=${encodeURIComponent(r.name+' menu')}`}
function instaUrl(r){return`https://www.instagram.com/explore/search/keyword/?q=${encodeURIComponent(r.name)}`}
function ratingDisplay(r){
  let s='';
  if(r.avg_rating)s+=`<span class="stars">★</span> ${r.avg_rating}`;
  if(r.rating_google&&r.rating_yelp)s+=` <span style="color:var(--text-muted);font-size:10px">(G:${r.rating_google} Y:${r.rating_yelp})</span>`;
  else if(r.total_reviews)s+=` <span style="color:var(--text-muted)">(${r.total_reviews.toLocaleString()})</span>`;
  return s;
}

function cardB(r,i){
  const h=heights[i%heights.length];
  const img=r.image_url?`<img src="${r.image_url}" style="height:${h}px" loading="lazy" onerror="this.outerHTML='<div class=img-ph>✦</div>'">`:'<div class="img-ph">✦</div>';
  const sv=isF(r.name)||r.is_favorite;
  return`<div class="card-b" data-i="${i}" onclick="if(!event.target.closest('.save')&&!event.target.closest('a'))openModal(${i})">
    ${img}<button class="save ${sv?'on':''}" onclick="togF('${esc(r.name)}',event)">${sv?'♥':'♡'}</button>
    ${r.michelin?`<div class="badge">${r.michelin}</div>`:''}
    <div class="body">
      <div class="name">${r.name}</div>
      <div class="cuisine">${r.cuisine_type}</div>
      <div class="info">${ratingDisplay(r)} · <span class="price">${r.price_display}</span> · ${r.area_name}</div>
      <div class="links"><a href="${bookUrl(r)}" target="_blank">Book</a>${r.yelp_url?`<a href="${r.yelp_url}" target="_blank">Yelp</a>`:''}<a href="${menuUrl(r)}" target="_blank">Menu</a><a href="${instaUrl(r)}" target="_blank">IG</a></div>
    </div></div>`;
}

function cardC(r,i){
  const img=r.image_url?`<img src="${r.image_url}" loading="lazy" onerror="this.outerHTML='<div class=img-ph>✦</div>'">`:'<div class="img-ph">✦</div>';
  const sv=isF(r.name)||r.is_favorite;
  return`<div class="card-c" data-i="${i}" onclick="if(!event.target.closest('.fav')&&!event.target.closest('a'))openModal(${i})">
    ${img}<div class="body">
      <div class="top"><div class="name">${r.name}${r.michelin?`<span class="badge-inline">${r.michelin}</span>`:''}</div><button class="fav ${sv?'on':''}" onclick="togF('${esc(r.name)}',event)">${sv?'♥':'♡'}</button></div>
      <div class="cuisine">${r.cuisine_type}</div>
      <div class="info">${ratingDisplay(r)} · ${r.price_display} · ${r.area_name}</div>
      <div class="links"><a href="${bookUrl(r)}" target="_blank">Book</a>${r.yelp_url?`<a href="${r.yelp_url}" target="_blank">Yelp</a>`:''}<a href="${menuUrl(r)}" target="_blank">Menu</a><a href="${instaUrl(r)}" target="_blank">IG</a></div>
    </div></div>`;
}

function popup(r){
  const img=r.image_url?`<img class="pop-img" src="${r.image_url}" onerror="this.style.display='none'">`:'';
  return`${img}<div class="pop-name">${r.name}</div><div class="pop-cuisine">${r.cuisine_type}</div>
    <div class="pop-meta">${stars(r.avg_rating)} (${(r.total_reviews||0).toLocaleString()}) · ${r.price_display}<br>${r.categories.join(', ')}<br>${r.address}</div>
    <div class="pop-links"><a href="${bookUrl(r)}" target="_blank">Book</a>${r.yelp_url?`<a href="${r.yelp_url}" target="_blank">Yelp</a>`:''}<a href="${menuUrl(r)}" target="_blank">Menu</a></div>`;
}

function getF(){
  return{
    vibe:document.getElementById('vibe-chip').classList.contains('active'),
    takeout:document.getElementById('takeout-chip').classList.contains('active'),
    cuisine:document.getElementById('f-cuisine').value,
    area:document.getElementById('f-area').value,
    price:document.getElementById('f-price').value,
    rating:parseFloat(document.getElementById('f-rating').value)||0,
    search:document.getElementById('f-search').value.toLowerCase().trim(),
    mic:document.getElementById('mic-chip').classList.contains('active'),
    fav:document.getElementById('fav-chip').classList.contains('active'),
  };
}

function applyFilters(){
  const f=getF();
  FILTERED=ALL.filter(r=>{

    // Takeout mode — all cuisines, all prices, just needs good food (4.0+ rating)
    if(f.takeout){
      if(r.avg_rating&&r.avg_rating<4.0)return false;
      if(!r.avg_rating)return false;
      // Skip vibe/cuisine/price filters, keep area + search + rating
    } else {
      // Normal vibe filter
      if(f.vibe&&!r.is_favorite&&!isF(r.name)){
        if(!VIBE.has(r.cuisine_type||''))return false;
        if((r.price_level||0)===1)return false;
        if(r.avg_rating&&r.avg_rating<4.0)return false;
        if(!r.avg_rating)return false;
        if((r.total_reviews||0)<50)return false;
      }
      if(f.cuisine==='coffee'){
        var cats=(r.categories||[]).join(' ').toLowerCase()+' '+r.name.toLowerCase()+(r.cuisine_type||'').toLowerCase();
        if(!cats.match(/coffee|matcha|tea |cafe|café|latte|espresso/))return false;
      } else if(f.cuisine!=='all'&&r.cuisine_type!==f.cuisine)return false;
      if(f.cuisine==='all'&&r.cuisine_type==='Other')return false;
    }

    // Area filter
    const an=(r.area_name||'').toLowerCase();
    const addr=(r.address||'').toLowerCase();
    const loc=an+' '+addr;
    if(f.area==='malibu'){if(!loc.includes('malibu'))return false}
    else if(f.area==='dtla'){if(!loc.includes('downtown'))return false}
    else if(f.area==='eastla'){if(!['silver lake','los feliz','eagle rock','koreatown','echo park','highland park'].some(a=>loc.includes(a)))return false}
    else if(f.area==='glendale'){if(!['glendale','burbank','pasadena'].some(a=>loc.includes(a)))return false}
    else if(f.area==='longbeach'){if(!loc.includes('long beach'))return false}
    else if(f.area==='irvine'){if(!loc.includes('irvine'))return false}
    else if(f.area==='newport'){if(!['newport beach','newport coast','balboa'].some(a=>loc.includes(a)))return false}
    else if(f.area==='costamesa'){if(!loc.includes('costa mesa'))return false}
    else if(f.area!=='all'&&r.area_tier!==parseInt(f.area))return false;

    if(f.price!=='all'&&r.price_level!==parseInt(f.price)&&r.price_level!==0)return false;
    if(f.rating>0&&r.avg_rating&&r.avg_rating<f.rating)return false;
    if(f.rating>0&&!r.avg_rating)return false;
    if(f.mic&&!r.michelin)return false;
    // Saved filter — check both hardcoded favorites AND user-saved localStorage
    if(f.fav&&!isF(r.name)&&!r.is_favorite)return false;
    if(f.search){const h=`${r.name} ${r.address} ${r.area_name} ${r.categories.join(' ')} ${r.cuisine_type}`.toLowerCase();if(!h.includes(f.search))return false}
    return true;
  });
  if(f.takeout)FILTERED.sort((a,b)=>(a.price_level||5)-(b.price_level||5)||(b.avg_rating||0)-(a.avg_rating||0));
  document.getElementById('count').textContent=FILTERED.length;
  renderRecs();renderGrid();renderList();
  if(mapReady)renderMap();
}

function renderRecs(){
  const scroll=document.getElementById('recs-scroll');
  // Show recommended spots that aren't favorites — with images, sorted by score
  // Recs pull from ALL data, not just current filter — so you always see recs regardless of area
  // Recs respect the current area filter
  const f=getF();
  const recs=ALL.filter(r=>{
    if(!r.is_recommended||r.is_favorite||r.is_disliked||!r.image_url)return false;
    const loc=((r.area_name||'')+(r.address||'')).toLowerCase();
    if(f.area==='malibu')return loc.includes('malibu');
    if(f.area==='dtla')return loc.includes('downtown');
    if(f.area==='eastla')return['silver lake','los feliz','eagle rock','koreatown','echo park'].some(a=>loc.includes(a));
    if(f.area==='glendale')return['glendale','burbank','pasadena'].some(a=>loc.includes(a));
    if(f.area==='longbeach')return loc.includes('long beach');
    if(f.area==='irvine')return loc.includes('irvine');
    if(f.area==='newport')return['newport beach','newport coast','balboa'].some(a=>loc.includes(a));
    if(f.area==='costamesa')return loc.includes('costa mesa');
    if(f.area!=='all'&&r.area_tier!==parseInt(f.area))return false;
    return true;
  }).slice(0,20);
  if(recs.length<3){document.getElementById('recs-section').style.display='none';return}
  document.getElementById('recs-section').style.display='block';window._recs=recs;
  scroll.innerHTML=recs.map((r,i)=>{
    return`<div class="rec-card" onclick="openRecModal(${i})">
      <img src="${r.image_url}" loading="lazy" onerror="this.outerHTML='<div class=rec-ph>✦</div>'">
      <div class="rec-tag">${r.michelin||'Pick for you'}</div>
      <div class="rec-body">
        <div class="rec-name">${r.name}</div>
        <div class="rec-meta"><span class="stars">★</span> ${r.avg_rating||'—'} · ${r.price_display} · ${r.area_name}</div>
      </div>
    </div>`}).join('');
}

function renderGrid(){const g=document.getElementById('masonry');g.innerHTML='';rendered=0;loadGrid()}
function loadGrid(){const g=document.getElementById('masonry');const e=Math.min(rendered+BATCH,FILTERED.length);let h='';for(let i=rendered;i<e;i++)h+=cardB(FILTERED[i],i);g.insertAdjacentHTML('beforeend',h);rendered=e}

function renderList(){const l=document.getElementById('list-cards');l.innerHTML='';renderedList=0;loadList()}
function loadList(){const l=document.getElementById('list-cards');const e=Math.min(renderedList+BATCH,FILTERED.length);let h='';for(let i=renderedList;i<e;i++)h+=cardC(FILTERED[i],i);l.insertAdjacentHTML('beforeend',h);renderedList=e}

function initMap(){if(mapReady)return;map=L.map('map',{attributionControl:false}).setView([34.05,-118.40],11);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);markerGroup=L.layerGroup().addTo(map);favGroup=L.layerGroup().addTo(map);mapReady=true}

function dot(c,s){var sz=s+4;return L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+c+';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(201,107,120,0.25);cursor:pointer"></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]})}
function heart(){return L.divIcon({className:'',html:'<div style="font-size:28px;color:#CB6E7A;filter:drop-shadow(0 2px 6px rgba(201,107,120,0.35));text-align:center;line-height:1;cursor:pointer">♥</div>',iconSize:[28,28],iconAnchor:[14,14]})}

function renderMap(){
  markerGroup.clearLayers();favGroup.clearLayers();let c=0;
  FILTERED.forEach(r=>{
    const f=isF(r.name)||r.is_favorite;
    if(f){const m=L.marker([r.lat,r.lng],{icon:heart(),zIndexOffset:1000});m.bindPopup(popup(r),{maxWidth:260});favGroup.addLayer(m)}
    else if(c<300){const col=DOTS[r.cuisine_type]||'#B8B0A8';const sz=r.score>=70?14:r.score>=50?11:9;const m=L.marker([r.lat,r.lng],{icon:dot(col,sz)});m.bindPopup(popup(r),{maxWidth:260});markerGroup.addLayer(m);c++}
  });
}

// ── Modal ──
function openModal(i){
  const r=FILTERED[i]; if(!r)return;
  const sv=isF(r.name)||r.is_favorite;
  const img=r.image_url?`<img class="modal-img" src="${r.image_url}" onerror="this.outerHTML='<div class=modal-img-ph>✦</div>'">`:'<div class="modal-img-ph">✦</div>';
  const yelpAlias=r.yelp_url?r.yelp_url.match(/biz\/([^?#]+)/)?.[1]:'';
  const photosUrl=yelpAlias?`https://www.yelp.com/biz_photos/${yelpAlias}`:'';
  const b=r.score_breakdown||{};

  document.getElementById('modal-card').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    ${img}
    <button class="modal-save ${sv?'on':''}" onclick="togF('${esc(r.name)}',event);openModal(${i})">${sv?'♥ Saved':'♡ Save'}</button>
    ${r.michelin?`<div class="modal-badge">${r.michelin}</div>`:''}
    <div class="modal-body">
      <div class="modal-name">${r.name}</div>
      <div class="modal-cuisine">${r.cuisine_type}</div>
      <div class="modal-stats">
        <div class="modal-stat"><span class="label">Rating</span><span class="val"><span class="stars">★</span> ${r.avg_rating||'—'}${r.rating_google&&r.rating_yelp?` <span style="font-size:10px;color:var(--text-muted)">(G:${r.rating_google} Y:${r.rating_yelp})</span>`:''}</span></div>
        <div class="modal-stat"><span class="label">Reviews</span><span class="val">${(r.total_reviews||0).toLocaleString()}${r.review_count_google&&r.review_count_yelp?` <span style="font-size:10px;color:var(--text-muted)">(G:${r.review_count_google} Y:${r.review_count_yelp})</span>`:''}</span></div>
        <div class="modal-stat"><span class="label">Price</span><span class="val">${r.price_display}</span></div>
        <div class="modal-stat"><span class="label">Vibe Score</span><span class="val">${r.score}/100</span></div>
      </div>
      <div class="modal-score">
        ${b.ambience!=null?`<div class="modal-score-item">Ambience <span>${b.ambience}</span></div>`:''}
        ${b.cuisine!=null?`<div class="modal-score-item">Cuisine <span>${b.cuisine}</span></div>`:''}
        ${b.rating!=null?`<div class="modal-score-item">Rating <span>${b.rating}</span></div>`:''}
        ${b.scene!=null?`<div class="modal-score-item">Scene <span>${b.scene}</span></div>`:''}
        ${b.trending?`<div class="modal-score-item">Trending <span>${b.trending}</span></div>`:''}
      </div>
      <div class="modal-cats">${r.categories.map(c=>`<span class="modal-cat">${c}</span>`).join('')}</div>
      <div class="modal-address">${r.area_name} · ${r.address}</div>
      ${r.description?`<div style="font-size:12px;color:var(--text-soft);line-height:1.5;margin-bottom:14px;font-style:italic">${r.description}</div>`:''}
      ${(r.extra_photos&&r.extra_photos.length)?`<div class="modal-photos">${r.extra_photos.map(p=>`<img src="${p}" loading="lazy" style="height:90px">`).join('')}</div>`:''}
      ${photosUrl?`<a class="modal-photos-link" href="${photosUrl}" target="_blank">View all photos on Yelp →</a>`:''}
      <div class="modal-links">
        <a class="modal-link primary" href="${bookUrl(r)}" target="_blank">Book a Table</a>
        ${r.yelp_url?`<a class="modal-link" href="${r.yelp_url}" target="_blank">Yelp</a>`:''}
        <a class="modal-link" href="${menuUrl(r)}" target="_blank">Menu</a>
        <a class="modal-link" href="${instaUrl(r)}" target="_blank">Instagram</a>
        <a class="modal-link" href="https://www.google.com/maps/search/${encodeURIComponent(r.name+' '+r.address)}" target="_blank">Directions</a>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function openRecModal(i){
  if(!window._recs||!window._recs[i])return;
  var r=window._recs[i];
  // Temporarily add to FILTERED so openModal works
  var tempIdx=FILTERED.length;
  FILTERED.push(r);
  openModal(tempIdx);
}

function setView(v){
  document.getElementById('grid-view').style.display=v==='grid'?'block':'none';
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  document.getElementById('map-view').style.display=v==='map'?'block':'none';
  document.getElementById('recs-section').style.display=v==='grid'?'block':'none';
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  document.getElementById('btn-map').classList.toggle('active',v==='map');
  if(v==='map'){initMap();setTimeout(()=>{map.invalidateSize();renderMap()},100)}
  if(v==='list'){renderList()}
}

async function init(){
  try{
  const resp=await fetch('restaurants.json?v='+Date.now());
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  ALL=await resp.json();
  console.log('Loaded '+ALL.length+' restaurants');
  }catch(e){console.error('LOAD FAILED:',e);document.getElementById('count').textContent='Error loading data';return;}
  const types=[...new Set(ALL.map(r=>r.cuisine_type))].sort();
  const sel=document.getElementById('f-cuisine');
  types.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});

  ['f-cuisine','f-area','f-price','f-rating'].forEach(id=>document.getElementById(id).addEventListener('change',applyFilters));
  let t;document.getElementById('f-search').addEventListener('input',()=>{clearTimeout(t);t=setTimeout(applyFilters,250)});
  ['vibe-chip','takeout-chip','mic-chip','fav-chip'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('click',function(){this.classList.toggle('active');applyFilters()});
  });
  document.getElementById('btn-grid').addEventListener('click',()=>setView('grid'));
  document.getElementById('btn-list').addEventListener('click',()=>setView('list'));
  document.getElementById('btn-map').addEventListener('click',()=>setView('map'));

  const obs=new IntersectionObserver(e=>{if(e[0].isIntersecting&&rendered<FILTERED.length)loadGrid()},{rootMargin:'200px'});
  obs.observe(document.getElementById('sentinel'));
  const obs2=new IntersectionObserver(e=>{if(e[0].isIntersecting&&renderedList<FILTERED.length)loadList()},{rootMargin:'200px'});
  obs2.observe(document.getElementById('sentinel-list'));

  applyFilters();
}
init();
</script>
</body>
